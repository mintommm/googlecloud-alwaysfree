name: Deploy Minecraft Controller

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/minecraft-controller/**'
      - 'shared/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # Linux (always-free) 向けにクロスコンパイル
    - name: Build Binary
      run: |
        cd apps/minecraft-controller
        GOOS=linux GOARCH=amd64 go build -o minecraft-controller main.go

    # 実行バイナリをGCEインスタンスにSSH転送
    - name: Deploy to GCE via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.INSTANCE_IP }}
        username: github-actions
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "apps/minecraft-controller/minecraft-controller"
        target: "/home/github-actions/apps/minecraft-controller"
        strip_components: 2
