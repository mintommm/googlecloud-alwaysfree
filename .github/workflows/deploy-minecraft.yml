name: Deploy Minecraft Controller

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/minecraft-controller/**'
      - 'shared/**'
      - 'infrastructure/minecraft-controller.service'
      - 'go.work'
      - '.github/workflows/deploy-minecraft.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o apps/minecraft-controller/minecraft-controller ./apps/minecraft-controller

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Config Files Locally
        run: |
          mkdir -p tmp

          cat << 'EOF' > tmp/.env
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
          MC_ZONE=asia-northeast1-a
          MC_INSTANCE_NAME=minecraft01
          CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}
          CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}
          RCON_PASSWORD=${{ secrets.RCON_PASSWORD }}
          DISCORD_NOTIFICATION_CHANNEL_ID=${{ secrets.DISCORD_NOTIFICATION_CHANNEL_ID }}
          EOF

          cat << 'EOF' > tmp/minecraft-controller.service
          [Unit]
          Description=Minecraft Controller Discord Bot
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=%h/apps/minecraft-controller
          EnvironmentFile=%h/apps/minecraft-controller/.env
          ExecStart=%h/apps/minecraft-controller/minecraft-controller
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=default.target
          EOF

      - name: Deploy Configs and Binary via IAP Tunneling
        run: |
          # 1. 動的ユーザー名とUIDを特定し、systemdユーザーインスタンスを明示的に強制起動
          gcloud compute ssh always-free --zone=us-central1-a --tunnel-through-iap --command='
            set -e
            CURRENT_USER=$(whoami)
            CURRENT_UID=$(id -u)

            # 永続化の有効化
            sudo loginctl enable-linger "$CURRENT_USER"

            # 非ログインセッション下でユーザーマネージャーインスタンスを強制起動（バスの生成）
            sudo systemctl start user@"$CURRENT_UID"

            # ディレクトリの事前作成
            mkdir -p ~/.config/systemd/user
            mkdir -p ~/apps/minecraft-controller
          '

          # 2. 生成されたバス空間を対象とした一括ファイル転送
          gcloud compute scp apps/minecraft-controller/minecraft-controller always-free:~/apps/minecraft-controller/ --zone=us-central1-a --tunnel-through-iap
          gcloud compute scp tmp/.env always-free:~/apps/minecraft-controller/ --zone=us-central1-a --tunnel-through-iap
          gcloud compute scp tmp/minecraft-controller.service always-free:~/.config/systemd/user/ --zone=us-central1-a --tunnel-through-iap

          # 3. 確立された環境変数を明示的に指定してサービスを制御
          gcloud compute ssh always-free --zone=us-central1-a --tunnel-through-iap --command='
            set -e
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            chmod 600 ~/apps/minecraft-controller/.env
            systemctl --user daemon-reload
            systemctl --user enable minecraft-controller.service
            systemctl --user restart minecraft-controller.service
          '
