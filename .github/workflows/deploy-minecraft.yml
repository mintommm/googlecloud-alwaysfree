name: Deploy Minecraft Controller

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/minecraft-controller/**'
      - 'shared/**'
      - 'infrastructure/minecraft-controller.service'
      - 'go.work'
      - '.github/workflows/deploy-minecraft.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o apps/minecraft-controller/minecraft-controller ./apps/minecraft-controller

      - name: Deploy Binary via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: github-actions
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "apps/minecraft-controller/minecraft-controller"
          target: "/home/github-actions/apps/minecraft-controller"
          strip_components: 2

      - name: Generate Configs and Restart User Service via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: github-actions
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # 非インタラクティブSSHセッションで systemd --user を捕捉可能にするための定義
            export XDG_RUNTIME_DIR=/run/user/$(id -u)

            # 1. ユーザー空間のディレクトリ群を自動生成（自所有権のため Permission denied は発生しない）
            mkdir -p /home/github-actions/.config/systemd/user
            mkdir -p /home/github-actions/apps/minecraft-controller

            # 2. 環境変数ファイルの動的生成
            cat << 'EOF' > /home/github-actions/apps/minecraft-controller/.env
            DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
            DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
            MC_ZONE=asia-northeast1-a
            MC_INSTANCE_NAME=minecraft01
            CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}
            CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}
            CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}
            RCON_PASSWORD=${{ secrets.RCON_PASSWORD }}
            DISCORD_NOTIFICATION_CHANNEL_ID=${{ secrets.DISCORD_NOTIFICATION_CHANNEL_ID }}
            EOF

            chmod 600 /home/github-actions/apps/minecraft-controller/.env

            # 3. ユーザーサービス定義ファイルの動的生成
            cat << 'EOF' > /home/github-actions/.config/systemd/user/minecraft-controller.service
            [Unit]
            Description=Minecraft Controller Discord Bot
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/home/github-actions/apps/minecraft-controller
            EnvironmentFile=/home/github-actions/apps/minecraft-controller/.env
            ExecStart=/home/github-actions/apps/minecraft-controller/minecraft-controller
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=default.target
            EOF

            # 4. ユーザー特権でのサービス有効化および再起動
            systemctl --user daemon-reload
            systemctl --user enable minecraft-controller.service
            systemctl --user restart minecraft-controller.service
