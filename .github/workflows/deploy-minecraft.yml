name: Deploy Minecraft Controller

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/minecraft-controller/**'
      - 'shared/**'
      - 'infrastructure/minecraft-controller.service'
      - 'go.work'
      - '.github/workflows/deploy-minecraft.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o apps/minecraft-controller/minecraft-controller ./apps/minecraft-controller

      - name: Deploy Binary via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: github-actions
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "apps/minecraft-controller/minecraft-controller"
          target: "/home/github-actions/apps/minecraft-controller"
          strip_components: 2

      - name: Deploy Service Template via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: github-actions
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "infrastructure/minecraft-controller.service"
          target: "/home/github-actions/apps/minecraft-controller"
          strip_components: 1

      - name: Generate Environment File and Restart Service via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.INSTANCE_IP }}
          username: github-actions
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 環境変数ファイルの動的生成
            cat << 'EOF' > /home/github-actions/apps/minecraft-controller/.env
            DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
            DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
            MC_ZONE=asia-northeast1-a
            MC_INSTANCE_NAME=minecraft01
            CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}
            CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}
            CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}
            RCON_PASSWORD=${{ secrets.RCON_PASSWORD }}
            DISCORD_NOTIFICATION_CHANNEL_ID=${{ secrets.DISCORD_NOTIFICATION_CHANNEL_ID }}
            EOF

            chmod 600 /home/github-actions/apps/minecraft-controller/.env

            # 2. 転送された正しいserviceファイルをシステム領域へコピー
            sudo cp /home/github-actions/apps/minecraft-controller/minecraft-controller.service /etc/systemd/system/minecraft-controller.service

            sudo chmod 644 /etc/systemd/system/minecraft-controller.service
            sudo chown root:root /etc/systemd/system/minecraft-controller.service

            # 3. 反映と再起動
            sudo systemctl daemon-reload
            sudo systemctl restart minecraft-controller.service
