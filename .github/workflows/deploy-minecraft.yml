name: Deploy Minecraft Controller

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/minecraft-controller/**'
      - 'shared/**'
      - 'infrastructure/minecraft-controller.service'
      - 'go.work'
      - '.github/workflows/deploy-minecraft.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o apps/minecraft-controller/minecraft-controller ./apps/minecraft-controller

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Config Files Locally
        run: |
          mkdir -p tmp

          # 固定絶対パス用の環境変数ファイルを生成
          cat << 'EOF' > tmp/.env
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
          MC_ZONE=asia-northeast1-a
          MC_INSTANCE_NAME=minecraft01
          CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}
          CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}
          RCON_PASSWORD=${{ secrets.RCON_PASSWORD }}
          DISCORD_NOTIFICATION_CHANNEL_ID=${{ secrets.DISCORD_NOTIFICATION_CHANNEL_ID }}
          EOF

          # システム全体で管理するシステムサービス定義ファイルを生成（絶対パス固定）
          cat << 'EOF' > tmp/minecraft-controller.service
          [Unit]
          Description=Minecraft Controller Discord Bot
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/minecraft-controller
          EnvironmentFile=/opt/minecraft-controller/.env
          ExecStart=/opt/minecraft-controller/minecraft-controller
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Deploy Configs and Binary via IAP Tunneling
        run: |
          # 1. 鍵生成の対話を防止するため --quiet を付与し、一時配置用ディレクトリを作成
          gcloud compute ssh always-free --zone=us-central1-a --tunnel-through-iap --quiet --command="
            set -e
            mkdir -p ~/tmp_deploy
            sudo mkdir -p /opt/minecraft-controller
          "

          # 2. 一時配置ディレクトリへファイルを安全に一括転送
          gcloud compute scp apps/minecraft-controller/minecraft-controller always-free:~/tmp_deploy/ --zone=us-central1-a --tunnel-through-iap --quiet
          gcloud compute scp tmp/.env always-free:~/tmp_deploy/ --zone=us-central1-a --tunnel-through-iap --quiet
          gcloud compute scp tmp/minecraft-controller.service always-free:~/tmp_deploy/ --zone=us-central1-a --tunnel-through-iap --quiet

          # 3. root特権を用いてシステム領域へファイルを配置し、システムサービスとして起動
          gcloud compute ssh always-free --zone=us-central1-a --tunnel-through-iap --quiet --command='
            set -e

            # バイナリと環境変数ファイルの移動および権限適正化
            sudo mv ~/tmp_deploy/minecraft-controller /opt/minecraft-controller/
            sudo mv ~/tmp_deploy/.env /opt/minecraft-controller/
            sudo chmod 700 /opt/minecraft-controller/minecraft-controller
            sudo chmod 600 /opt/minecraft-controller/.env

            # システムサービス定義ファイルの配置
            sudo mv ~/tmp_deploy/minecraft-controller.service /etc/systemd/system/
            sudo chmod 644 /etc/systemd/system/minecraft-controller.service

            # 一時ディレクトリのクリーンアップ
            rm -rf ~/tmp_deploy

            # システムレイヤー（特権）でのデーモンリロードおよび再起動
            sudo systemctl daemon-reload
            sudo systemctl enable minecraft-controller.service
            sudo systemctl restart minecraft-controller.service
          '
